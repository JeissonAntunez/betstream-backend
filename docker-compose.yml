version: '3.9'

# ============================================================
# BetStream - Full Stack Docker Compose
# ============================================================
# Usage:
#   cp .env.example .env   (fill your Supabase credentials)
#   docker compose up -d
# ============================================================

services:

  # ─────────────────────────────
  # NGINX - Reverse Proxy / Gateway
  # ─────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: betstream-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - betstream-api
      - betstream-frontend
    networks:
      - betstream-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─────────────────────────────
  # BACKEND - Spring WebFlux API
  # ─────────────────────────────
  betstream-api:
    build:
      context: ./betstream-backend
      dockerfile: Dockerfile
    container_name: betstream-api
    environment:
      SUPABASE_HOST: ${SUPABASE_HOST}
      SUPABASE_PORT: ${SUPABASE_PORT:-6543}
      SUPABASE_DB: ${SUPABASE_DB:-postgres}
      SUPABASE_USER: ${SUPABASE_USER}
      SUPABASE_PASSWORD: ${SUPABASE_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-betstream}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-betstream123}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:5173}
      SERVER_PORT: 8080
      JAVA_OPTS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Xmx512m -Xms256m"
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - betstream-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────
  # FRONTEND - React + Vite
  # ─────────────────────────────
  betstream-frontend:
    build:
      context: ./betstream-frontend
      dockerfile: Dockerfile
    container_name: betstream-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
    ports:
      - "3000:80"
    networks:
      - betstream-net
    restart: unless-stopped

  # ─────────────────────────────
  # REDIS - Cache + Pub/Sub
  # ─────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: betstream-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - betstream-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─────────────────────────────
  # RABBITMQ - Message Broker
  # ─────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: betstream-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-betstream}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-betstream123}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - betstream-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ─────────────────────────────
  # PROMETHEUS - Metrics Collector
  # ─────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: betstream-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - betstream-net
    restart: unless-stopped

  # ─────────────────────────────
  # GRAFANA - Dashboards
  # ─────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: betstream-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - betstream-net
    restart: unless-stopped

# ─────────────────────────────
# VOLUMES
# ─────────────────────────────
volumes:
  redis-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:

# ─────────────────────────────
# NETWORK
# ─────────────────────────────
networks:
  betstream-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
