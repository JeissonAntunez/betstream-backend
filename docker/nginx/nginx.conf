worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json text/event-stream;

    # Upstream backends
    upstream betstream_api {
        server betstream-api:8080;
        keepalive 32;
    }

    upstream betstream_frontend {
        server betstream-frontend:80;
    }

    server {
        listen 80;
        server_name _;

        # Rate limiting
        limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
        limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

        # ── Frontend (React SPA) ─────────────────────────────────
        location / {
            proxy_pass http://betstream_frontend;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # ── API REST ─────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://betstream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_read_timeout 30s;
        }

        # ── Auth endpoints (stricter rate limit) ─────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://betstream_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── SSE streams (critical: disable buffering) ─────────────
        location /api/v1/events/odds/stream {
            proxy_pass http://betstream_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;

            # CRITICAL for SSE: disable all buffering
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
            proxy_send_timeout 24h;
            chunked_transfer_encoding on;

            # SSE headers
            add_header Content-Type "text/event-stream";
            add_header Cache-Control "no-cache";
            add_header X-Accel-Buffering "no";
        }

        location /api/v1/events/scores/stream {
            proxy_pass http://betstream_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
            add_header X-Accel-Buffering "no";
        }

        # Actuator (internal only - restrict in production)
        location /actuator/ {
            proxy_pass http://betstream_api;
            allow 172.20.0.0/16;
            deny all;
        }
    }
}
